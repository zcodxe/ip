<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IP Finder</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#1a1a1a;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:1rem}.container{background:#fff;border-radius:8px;padding:clamp(1.5rem,8vw,3rem);width:100%;max-width:clamp(350px,90vw,500px);box-shadow:0 2px 8px rgba(0,0,0,.08)}h1{font-size:clamp(0.9rem,1.2vw,1.1rem);color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1.5rem;font-weight:600}.country{font-size:clamp(2.2rem,6vw,3.5rem);font-weight:700;color:#387ed1;margin-bottom:0.75rem;line-height:1.2}.city{font-size:clamp(1.1rem,2.8vw,1.3rem);color:#666;margin-bottom:2rem;font-weight:500;word-wrap:break-word}.divider{height:1px;background:#e5e5e5;margin:2rem 0}.ip-label{font-size:clamp(0.8rem,1vw,0.9rem);color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:0.75rem;font-weight:600}.ip{font-size:clamp(1.2rem,2.5vw,1.4rem);font-family:'Courier New',monospace;color:#1a1a1a;letter-spacing:.5px;margin-bottom:1.5rem;font-weight:600;word-break:break-all;padding:1rem;background:#f9f9f9;border-radius:4px}.loading{color:#999}button{width:100%;padding:clamp(0.85rem,2.5vw,1rem);background:#387ed1;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:clamp(1rem,2.2vw,1.1rem);font-weight:600;transition:.3s}button:hover{background:#2f6fbd}button:active{transform:scale(.98)}</style>
</head>
<body>
<div class="container">
<h1>Your Location</h1>
<div class="country" id="c">—</div>
<div class="city" id="ct" class="loading">Fetching...</div>
<div class="divider"></div>
<div class="ip-label">IP Address</div>
<div class="ip loading" id="ip">—</div>
<button onclick="location.reload()">Refresh</button>
</div>
<script>fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>{document.getElementById('c').textContent=d.country_name;document.getElementById('ct').textContent=d.city+', '+d.region;document.getElementById('ip').textContent=d.ip;['ct','ip'].forEach(i=>document.getElementById(i).classList.remove('loading'))}).catch(()=>{document.getElementById('c').textContent='Error';document.getElementById('ct').textContent='Unable to fetch';document.getElementById('ip').textContent='—'})</script>
</body>
</html>
