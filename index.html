<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IP Finder</title>
  <style>
    :root {
      --bg-primary: #f5f7fa;
      --bg-secondary: #fff;
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --text-tertiary: #999;
      --border-color: #e5e5e5;
      --input-bg: #f9f9f9;
      --accent-color: #387ed1;
      --accent-hover: #2f6fbd;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #0f1419;
        --bg-secondary: #1a1f2e;
        --text-primary: #e8eaed;
        --text-secondary: #b0b4ba;
        --text-tertiary: #70747a;
        --border-color: #2d3139;
        --input-bg: #242b38;
        --accent-color: #5b9eeb;
        --accent-hover: #7bb0f0;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: clamp(1.5rem, 8vw, 3rem);
      width: 100%;
      max-width: clamp(350px, 90vw, 500px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: background 0.3s, box-shadow 0.3s;
    }

    h1 {
      font-size: clamp(0.9rem, 1.2vw, 1.1rem);
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    .country {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 700;
      color: var(--accent-color);
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    .city {
      font-size: clamp(1.1rem, 2.8vw, 1.3rem);
      color: var(--text-secondary);
      margin-bottom: 2rem;
      font-weight: 500;
      word-wrap: break-word;
    }

    .divider {
      height: 1px;
      background: var(--border-color);
      margin: 2rem 0;
    }

    .ip-label {
      font-size: clamp(0.8rem, 1vw, 0.9rem);
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }

    .ip {
      font-size: clamp(1.2rem, 2.5vw, 1.4rem);
      font-family: 'Courier New', monospace;
      color: var(--text-primary);
      letter-spacing: 0.5px;
      margin-bottom: 1.5rem;
      font-weight: 600;
      word-break: break-all;
      padding: 1rem;
      background: var(--input-bg);
      border-radius: 4px;
      transition: background 0.3s;
    }

    .loading {
      color: var(--text-tertiary);
    }

    button {
      width: 100%;
      padding: clamp(0.85rem, 2.5vw, 1rem);
      background: var(--accent-color);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: clamp(1rem, 2.2vw, 1.1rem);
      font-weight: 600;
      transition: background 0.3s, transform 0.1s;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Your Location</h1>
    <div class="country" id="country">—</div>
    <div class="city loading" id="city">Fetching...</div>
    <div class="divider"></div>
    <div class="ip-label">IP Address</div>
    <div class="ip loading" id="ip">—</div>
    <button onclick="location.reload()">Refresh</button>
  </div>

  <script>
    fetch('https://ipapi.co/json/')
      .then(r => r.json())
      .then(d => {
        document.getElementById('country').textContent = d.country_name;
        document.getElementById('city').textContent = d.city + ', ' + d.region;
        document.getElementById('ip').textContent = d.ip;
        document.getElementById('city').classList.remove('loading');
        document.getElementById('ip').classList.remove('loading');
      })
      .catch(() => {
        document.getElementById('country').textContent = 'Error';
        document.getElementById('city').textContent = 'Unable to fetch';
        document.getElementById('ip').textContent = '—';
      });
  </script>
</body>
</html>
