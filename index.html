<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IP Finder</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#1a1a1a;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:1rem}.container{background:#fff;border-radius:8px;padding:clamp(1rem,5vw,2rem);width:100%;max-width:clamp(300px,90vw,400px);box-shadow:0 2px 8px rgba(0,0,0,.08)}h1{font-size:clamp(.75rem,.9vw,.875rem);color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1rem;font-weight:600}.country{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:700;color:#387ed1;margin-bottom:.5rem}.city{font-size:clamp(.85rem,2vw,.95rem);color:#666;margin-bottom:1.5rem;font-weight:500;word-wrap:break-word;overflow-wrap:break-word}.divider{height:1px;background:#e5e5e5;margin:1.5rem 0}.ip-label{font-size:clamp(.65rem,.8vw,.75rem);color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem;font-weight:600}.ip{font-size:clamp(.9rem,2vw,1.1rem);font-family:'Courier New',monospace;color:#1a1a1a;letter-spacing:.5px;margin-bottom:1rem;font-weight:600;word-wrap:break-word;overflow-wrap:break-word;word-break:break-all;padding:.75rem;background:#f9f9f9;border-radius:4px}.loading{color:#999}button{width:100%;padding:clamp(.6rem,2vw,.75rem);background:#387ed1;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:clamp(.85rem,2vw,.9rem);font-weight:600;transition:.3s}button:hover{background:#2f6fbd}@media(max-width:600px){.container{padding:1rem}}@media(max-width:380px){.country{font-size:1.5rem}.ip{font-size:.9rem;padding:.5rem}button{padding:.6rem}}</style>
</head>
<body>
<div class="container">
<h1>Your Location</h1>
<div class="country" id="c">—</div>
<div class="city" id="ct" class="loading">Fetching...</div>
<div class="divider"></div>
<div class="ip-label">IP Address</div>
<div class="ip loading" id="ip">—</div>
<button onclick="location.reload()">Refresh</button>
</div>
<script>fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>{document.getElementById('c').textContent=d.country_name;document.getElementById('ct').textContent=d.city+', '+d.region;document.getElementById('ip').textContent=d.ip;document.getElementById('ct').classList.remove('loading');document.getElementById('ip').classList.remove('loading')}).catch(()=>{document.getElementById('c').textContent='Error';document.getElementById('ct').textContent='Unable to fetch';document.getElementById('ip').textContent='—'});</script>
</body>
</html>
