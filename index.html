<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Location</title>
  <style>
    :root{color-scheme:light dark;--bg:#f5f7fa;--card:#fff;--text:#1a1a1a;--muted:#666;--value:#387ed1;--btn:#387ed1;--divider:#e5e5e5}
    @media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#2d2d2d;--text:#e9e9e9;--muted:#999;--value:#558eb7;--btn:#4c80a6;--divider:#404040}}
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    .container{width:100%;max-width:400px;padding:40px;background:var(--card);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
    h1{font-size:24px;opacity:0.5;font-weight:600;margin-bottom:24px}
    .info{margin-bottom:20px}
    .label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px;letter-spacing:0.5px}
    .value{font-size:18px;font-weight:600;color:var(--value);word-break:break-all}
    hr{border:none;height:1px;background:var(--divider);margin:24px 0}
    button{width:100%;padding:12px;border:none;border-radius:8px;background:var(--btn);color:#000000;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
    button:hover{opacity:0.9}
    button:active{transform:scale(0.98)}
    button:disabled{opacity:0.7;cursor:not-allowed}
  </style>
</head>
<body>
  <main class="container">
    <h1>IP Location</h1>
    <div class="info"><div class="label">Country</div><div class="value" id="country">—</div></div>
    <div class="info"><div class="label">City</div><div class="value" id="city">Fetching...</div></div>
    <hr>
    <div class="info"><div class="label">IP Address</div><div class="value" id="ip" style="font-family:monospace;font-size:16px">—</div></div>
    <button id="refreshBtn">Refresh</button>
  </main>
  <script>
    let cooldown=0;
    const fetchData=()=>{
      if(cooldown>0)return;
      document.getElementById("city").textContent="Fetching...";
      cooldown=5;
      const btn=document.getElementById("refreshBtn");
      btn.disabled=true;
      const timer=setInterval(()=>{
        if(--cooldown<=0){
          clearInterval(timer);
          btn.disabled=false;
          btn.textContent="Refresh";
        }else{
          btn.textContent=`Refresh (${cooldown}s)`;
        }
      },1000);
      fetch("https://ipapi.co/json/").then(r=>r.json()).then(d=>{
        document.getElementById("country").textContent=d.country_name||"Unknown";
        document.getElementById("city").textContent=[d.city,d.region].filter(Boolean).join(", ")||"Unknown";
        document.getElementById("ip").textContent=d.ip||"Unknown";
      }).catch(()=>{
        document.getElementById("country").textContent="Error";
        document.getElementById("city").textContent="Unable to fetch";
        document.getElementById("ip").textContent="—";
      });
    };
    document.getElementById("refreshBtn").addEventListener("click",fetchData);
    fetchData();
  </script>
</body>
</html>
