<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>IP Info</title>
<!-- Active theme — JS switches this href on theme change -->
<link id="theme-style" rel="stylesheet" href="css/themes/ocean-teal.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;min-width:0}
/* :root and body.dark live in css/themes/*.css — not here */
*{-webkit-tap-highlight-color:transparent}
body{font-family:Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .1s,color .1s}

header{height:56px;background:var(--surface);display:flex;justify-content:flex-end;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);gap:10px}
button{cursor:pointer;border:none;border-radius:20px;font-weight:600;font-family:inherit}
.btn{background:var(--p);color:var(--op);padding:8px 16px;min-width:80px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;transition:opacity .2s,background .2s}
.btn:hover{opacity:.85}
.btn:active{opacity:.7}
.btn:disabled{opacity:.45;cursor:not-allowed}

main{max-width:560px;margin:auto;padding:16px}

.info-row{padding:10px 0;border-bottom:1px solid var(--sv)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:12px;color:var(--label);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.info-value{font-family:monospace;word-break:break-all;cursor:pointer;font-size:15px}
.info-value:hover{color:var(--p)}

/* UTC sub-label */
.utc-badge{
  display:inline-block;margin-left:8px;font-size:11px;font-weight:600;
  background:var(--pc);color:var(--opc);border-radius:4px;padding:1px 6px;
  vertical-align:middle;letter-spacing:.2px
}

/* ── Skeleton ── */
.skel{
  display:inline-block;border-radius:6px;
  background:linear-gradient(90deg,var(--skel-base) 25%,var(--skel-shine) 50%,var(--skel-base) 75%);
  background-size:200% 100%;animation:shimmer 1.2s infinite;height:16px;vertical-align:middle
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-latlng{width:140px}.skel-city{width:160px}.skel-isp{width:200px}
.skel-tz{width:130px}.skel-ipv4{width:110px}.skel-ipv6{width:220px}

.section{margin-top:12px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.section-header{
  width:100%;padding:14px 16px;background:var(--pc);color:var(--opc);
  display:flex;justify-content:space-between;align-items:center;
  font-weight:600;font-size:14px;border:none;border-radius:0;transition:background .2s
}
.section-header:hover{filter:brightness(.95)}
.section-header .arrow{transition:transform .3s;font-size:18px}
.section-header.open .arrow{transform:rotate(90deg)}
.section-body{display:none;padding:4px 16px 8px;background:var(--surface)}
.section-body.show{display:block}

/* ── Map box ── */
.map-box{display:none;margin-top:12px;border:1px solid var(--border);border-radius:12px;overflow:hidden;display:none;flex-direction:column}
.map-box.show{display:flex}
#map{height:240px;width:100%;order:1;transition:height .2s}
#mapToolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface);border-top:1px solid var(--border);gap:6px;order:2}
#mapLabel{font-size:15px;font-weight:700;color:var(--opc);min-height:22px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--pc);border-radius:6px;padding:4px 8px;border:none;cursor:pointer;font-family:inherit;text-align:left;transition:filter .15s}
#mapLabel:hover{filter:brightness(.92)}
#mapTime{font-size:15px;font-weight:700;font-family:monospace;background:var(--pc);color:var(--opc);border:none;border-radius:6px;padding:4px 8px;white-space:nowrap;flex-shrink:0;min-width:84px;text-align:center;letter-spacing:.3px;cursor:pointer;user-select:none;-webkit-user-select:none}
#zoomCtrl{display:flex;align-items:center;gap:4px}
.zstep{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--sv);color:var(--os);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center}
.zstep:hover{background:var(--pc);color:var(--opc)}
.zstep:disabled{opacity:.35;cursor:not-allowed}
#zoomNum{min-width:28px;text-align:center;font-size:15px;font-weight:700;background:var(--pc);color:var(--opc);border-radius:6px;padding:4px 8px;font-family:monospace}
#fsBtn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--sv);color:var(--os);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#fsBtn:hover{background:var(--pc);color:var(--opc)}
body:not(.dark) .leaflet-container{background:var(--bg)!important}
.leaflet-tooltip{background:var(--pc);color:var(--opc);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;font-weight:600;box-shadow:none}
.leaflet-tooltip-top::before{border-top-color:var(--border)}
.map-city-tip{background:var(--p)!important;color:var(--op)!important;border-color:var(--p)!important;font-weight:700}
.map-box.fullscreen{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:2000;border-radius:0;margin:0;border:none;display:flex;flex-direction:column}
.map-box.fullscreen #map{height:calc(100vh - 53px)!important;order:1}
.map-box.fullscreen #mapToolbar{order:2;padding:10px 14px}

.ig{display:flex;gap:8px;margin-bottom:10px}
.input-wrap{position:relative;flex:1}
.input-wrap input{width:100%;padding:10px 36px 10px 12px;border:1px solid var(--border);background:var(--surface);color:var(--os);caret-color:var(--p);border-radius:8px;font-size:14px;font-family:inherit;transition:border-color .2s}
input::placeholder{color:var(--osv)}
input:focus{outline:none;border-color:var(--p)}
.clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--bg);color:var(--os);font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .2s;border:2px solid var(--p)}
.clear-btn.show{opacity:1;pointer-events:auto}

.cc{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--os);font-family:monospace;transition:background .2s}
.chip:hover{background:var(--sv)}
.chip.ipv4{background:var(--pc);color:var(--opc);border-color:transparent}
.chip.ipv6{background:var(--sv);color:var(--osv);border-color:transparent}

/* ── Theme Picker ── */
.theme-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:8px;padding:10px 0 4px
}
.theme-card{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:10px 6px;border-radius:10px;border:2px solid var(--border);
  background:var(--surface);cursor:pointer;
  transition:border-color .18s,background .18s;
  user-select:none;-webkit-user-select:none
}
.theme-card:hover{border-color:var(--p);background:var(--sv)}
.theme-card.active{border-color:var(--p);background:var(--pc)}
.theme-card.active .theme-name{color:var(--opc);font-weight:700}
.theme-swatches{display:flex;gap:3px}
.theme-swatch{width:20px;height:20px;border-radius:5px;border:1px solid rgba(0,0,0,.08)}
.theme-name{font-size:11px;font-weight:600;color:var(--os);text-align:center;line-height:1.3;letter-spacing:.1px}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--os);color:var(--surface);padding:10px 20px;border-radius:22px;font-size:15px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999;white-space:nowrap;display:flex;align-items:center;gap:8px}
.toast.show{opacity:.95}
.toast-icon{font-size:17px;flex-shrink:0}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

#cooldownBar{position:fixed;top:56px;left:0;height:3px;width:0%;background:var(--p);z-index:999;display:none;transition:width .1s linear}

@media(max-width:480px){
  #cooldownBar{top:auto;bottom:56px}
  header{position:fixed;bottom:0;left:0;width:100%;padding:10px 16px;border-top:1px solid var(--border);border-bottom:none;justify-content:space-between;background:var(--surface);z-index:1000;gap:10px}
  .btn{flex:1;padding:12px}
  .ig{flex-direction:column}
  .ig .btn{width:100%}
  main{padding-bottom:90px}
  .toast{bottom:94px}
}
</style>
</head>
<body>

<div id="cooldownBar"></div>

<header>
  <button id="reloadBtn" class="btn">Reload</button>
  <button id="themeBtn" class="btn">Dark</button>
</header>

<main>

  <div class="section" style="margin-top:0;border-radius:12px">
    <div style="padding:12px 16px;background:var(--surface)">
      <div class="info-row">
        <div class="info-label">Country</div>
        <div id="country">—</div>
      </div>
      <div class="info-row">
        <div class="info-label">Latitude, Longitude</div>
        <div id="latlng" class="info-value" title="Click to copy"><span class="skel skel-latlng"></span></div>
      </div>
    </div>
  </div>

  <button id="mapBtn" class="btn" style="width:100%;margin-top:12px;border-radius:10px;padding:12px">Show Map</button>
  <div id="mapBox" class="map-box">
    <div id="map"></div>
    <div id="mapToolbar">
      <button id="mapLabel" title="Reset to default view"></button>
      <span id="mapTime"></span>
      <div id="zoomCtrl">
        <button class="zstep" id="zoomOut">&#8722;</button>
        <span id="zoomNum">3</span>
        <button class="zstep" id="zoomIn">&#43;</button>
      </div>
      <button id="fsBtn" title="Full screen">&#x26F6;</button>
    </div>
  </div>

  <div class="section">
    <button class="section-header" onclick="toggleSection('loc',this)">
      Location &amp; ISP <span class="arrow">›</span>
    </button>
    <div id="loc" class="section-body">
      <div class="info-row"><div class="info-label">City &amp; Region</div><div id="city"><span class="skel skel-city"></span></div></div>
      <div class="info-row"><div class="info-label">ISP / Org</div><div id="isp"><span class="skel skel-isp"></span></div></div>
      <div class="info-row">
        <div class="info-label">Timezone</div>
        <div id="tz"><span class="skel skel-tz"></span></div>
      </div>
    </div>
  </div>

  <div class="section">
    <button class="section-header" onclick="toggleSection('ipSec',this)">
      IP Address <span class="arrow">›</span>
    </button>
    <div id="ipSec" class="section-body">
      <div class="info-row"><div class="info-label">IPv4</div><div id="ipv4" class="info-value" title="Click to copy"><span class="skel skel-ipv4"></span></div></div>
      <div class="info-row"><div class="info-label">IPv6</div><div id="ipv6" class="info-value" title="Click to copy"><span class="skel skel-ipv6"></span></div></div>
    </div>
  </div>

  <div class="section">
    <button class="section-header" onclick="toggleSection('custom',this)">
      Check Custom IP / Domain <span class="arrow">›</span>
    </button>
    <div id="custom" class="section-body">
      <div class="ig" style="margin-top:10px">
        <div class="input-wrap">
          <input id="inp" placeholder="Enter IP address or domain" autocomplete="off" spellcheck="false">
          <button id="clearBtn" class="clear-btn" title="Clear">×</button>
        </div>
        <button class="btn" onclick="lookupCustom()">Lookup</button>
      </div>
      <div id="rBox" style="display:none">
        <div class="info-row"><div class="info-label">Resolved IPs</div><div id="rIP" class="cc"></div></div>
      </div>
      <div id="cRes" style="display:none">
        <div class="info-row"><div class="info-label">Country</div><div id="cc">—</div></div>
        <div class="info-row"><div class="info-label">City / Region</div><div id="cct">—</div></div>
        <div class="info-row"><div class="info-label">Coordinates</div><div id="cl" class="info-value">—</div></div>
        <div class="info-row"><div class="info-label">ISP / Org</div><div id="ci">—</div></div>
      </div>
    </div>
  </div>

  <!-- ── Theme Picker (generated by JS from THEMES array) ── -->
  <div class="section">
    <button class="section-header" onclick="toggleSection('themePicker',this)">
      Color Theme <span class="arrow">›</span>
    </button>
    <div id="themePicker" class="section-body">
      <div id="themeGrid" class="theme-grid"></div>
    </div>
  </div>

</main>

<div id="toast" class="toast"><span id="toastIcon" class="toast-icon"></span><span id="toastMsg"></span></div>

<!-- Theme config — edit this file to add themes -->
<script src="themes.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

/* ══════════════════════════════════════════
   THEME SYSTEM
   ══════════════════════════════════════════ */
const THEME_LINK      = document.getElementById('theme-style');
const THEME_GRID      = document.getElementById('themeGrid');
const DEFAULT_THEME   = 'ocean-teal';
const THEME_STORE_KEY = 'ipinfo-color-theme';
const THEME_CSS_CACHE = 'ipinfo-theme-css-'; // prefix + themeId

// Fix 3: inject cached CSS instantly (avoids FOUC on slow connections)
function injectThemeCSS(id, cssText){
  let el=document.getElementById('theme-inline');
  if(!el){ el=document.createElement('style'); el.id='theme-inline'; document.head.appendChild(el); }
  el.textContent=cssText;
  THEME_LINK.disabled=true; // disable link tag — inline takes over
}

async function applyColorTheme(id, save=true){
  const theme = THEMES.find(t=>t.id===id) || THEMES.find(t=>t.id===DEFAULT_THEME);
  if(!theme) return;

  // Fix 3: check sessionStorage for cached CSS
  const cacheKey=THEME_CSS_CACHE+theme.id;
  const cached=sessionStorage.getItem(cacheKey);
  if(cached){
    injectThemeCSS(theme.id, cached);
  } else {
    // Not cached: load via link tag normally, then cache it
    const el=document.getElementById('theme-inline');
    if(el) el.textContent='';
    THEME_LINK.disabled=false;
    THEME_LINK.href='css/themes/'+theme.file;
    // Fetch and cache for next time
    fetch('css/themes/'+theme.file)
      .then(r=>r.text())
      .then(css=>{ try{sessionStorage.setItem(cacheKey,css);}catch(e){} })
      .catch(()=>{});
  }

  // Mark active card
  document.querySelectorAll('.theme-card').forEach(c=>{
    c.classList.toggle('active', c.dataset.id===theme.id);
  });

  // Re-style map layer colors without re-centering (just update styles, not re-render)
  if(typeof geoLayer!=='undefined'&&geoLayer&&typeof mapInstance!=='undefined'&&mapInstance){
    const primary=getComputedStyle(document.body).getPropertyValue('--p').trim();
    const pcColor=getComputedStyle(document.body).getPropertyValue('--pc').trim();
    const uc=E.country.textContent.replace(/\s*\(.*\)/,'').trim().toLowerCase();
    setTimeout(()=>{
      geoLayer.setStyle(f=>{
        const m=(f.properties.name||'').toLowerCase()===uc;
        return{color:m?(isDark?pcColor:primary):(isDark?'#444':'#8fa8b8'),weight:m?2:1.2,
               fillColor:m?primary:(isDark?'#222':'#1a1f23'),fillOpacity:m?0.45:(isDark?0.2:0.18)};
      });
    },90);
  }

  if(save) localStorage.setItem(THEME_STORE_KEY, theme.id);
}

function buildThemeGrid(){
  THEME_GRID.innerHTML='';
  THEMES.forEach(t=>{
    const card=document.createElement('div');
    card.className='theme-card';
    card.dataset.id=t.id;

    // Color swatches
    const swatches=document.createElement('div');
    swatches.className='theme-swatches';
    t.colors.forEach(c=>{
      const s=document.createElement('span');
      s.className='theme-swatch';
      s.style.background=c;
      swatches.appendChild(s);
    });

    const name=document.createElement('span');
    name.className='theme-name';
    name.textContent=t.name;

    card.appendChild(swatches);
    card.appendChild(name);
    card.addEventListener('click',()=>applyColorTheme(t.id));
    THEME_GRID.appendChild(card);
  });
}

function initTheme(){
  buildThemeGrid();
  const saved=localStorage.getItem(THEME_STORE_KEY)||DEFAULT_THEME;
  applyColorTheme(saved, false);
  // Mark active without re-saving
  document.querySelectorAll('.theme-card').forEach(c=>{
    c.classList.toggle('active', c.dataset.id===saved);
  });
}

/* ══════════════════════════════════════════
   APP
   ══════════════════════════════════════════ */
const COOLDOWN_MS = 5000;
const MIN_ZOOM = 1, MAX_ZOOM = 8;

let currentLat = NaN, currentLon = NaN;
let mapInstance = null, geoLayer = null, cityMarker = null;
let cachedGeo = null;
let toastTimer = null;
let isLoading = false;
let cooldownTimer = null;
let cooldownInterval = null;
let currentMapZoom = 3;
let isFullscreen = false;

const $ = id => document.getElementById(id);
const E = {
  country:$('country'), latlng:$('latlng'),
  city:$('city'), isp:$('isp'), tz:$('tz'),
  ipv4:$('ipv4'), ipv6:$('ipv6'),
  mapBtn:$('mapBtn'), mapBox:$('mapBox'),
  inp:$('inp'), clearBtn:$('clearBtn'),
  rBox:$('rBox'), rIP:$('rIP'),
  cRes:$('cRes'), cc:$('cc'), cl:$('cl'), cct:$('cct'), ci:$('ci'),
  toast:$('toast'), themeBtn:$('themeBtn'), reloadBtn:$('reloadBtn'),
  bar:$('cooldownBar'), mapLabel:$('mapLabel'),
  zoomNum:$('zoomNum'), zoomIn:$('zoomIn'), zoomOut:$('zoomOut'),
  fsBtn:$('fsBtn'), mapTime:$('mapTime'),
  toastIcon:$('toastIcon'), toastMsg:$('toastMsg')
};

/* ── Skeleton helpers ── */
const SKEL_CLASSES = {
  latlng:'skel skel-latlng',city:'skel skel-city',
  isp:'skel skel-isp',tz:'skel skel-tz',
  ipv4:'skel skel-ipv4',ipv6:'skel skel-ipv6',
};
function showSkeletons(){
  for(const [key,cls] of Object.entries(SKEL_CLASSES))
    E[key].innerHTML=`<span class="${cls}"></span>`;
}
function clearSkel(el,html,isHTML=false){
  if(isHTML) el.innerHTML=html; else el.textContent=html;
}

/* ── Toast ── */
// ok=true → ✓ green circle, ok=false → ✗ red circle, ok=null → no icon
function toast(msg, ok=null, dur=2400){
  clearTimeout(toastTimer);
  E.toastMsg.textContent=msg;
  E.toastIcon.textContent = ok===true ? '✓' : ok===false ? '✕' : '';
  E.toastIcon.style.color = ok===true ? '#4ade80' : ok===false ? '#f87171' : '';
  E.toast.classList.add('show');
  toastTimer=setTimeout(()=>E.toast.classList.remove('show'),dur);
}

/* ── Copy (delegated) ── */
document.addEventListener('click',e=>{
  if(!e.target.classList.contains('info-value')) return;
  const t=e.target.textContent.trim();
  if(!t||t==='—') return;
  navigator.clipboard.writeText(t).then(()=>toast('Copied:, true)).catch(()=>toast('Copy failed', false));
});

/* ── Dark / Light mode toggle ── */
let isDark=localStorage.getItem('theme')==='dark';
function applyDarkMode(){
  document.body.classList.toggle('dark',isDark);
  E.themeBtn.textContent=isDark?'Light':'Dark';
  if(mapInstance&&cachedGeo) renderMap(cachedGeo);
}
applyDarkMode();
E.themeBtn.addEventListener('click',()=>{
  isDark=!isDark;
  localStorage.setItem('theme',isDark?'dark':'light');
  applyDarkMode();
});

/* ── Section toggle ── */
function toggleSection(id,btn){
  const open=$(id).classList.toggle('show');
  btn.classList.toggle('open',open);
}

/* ── Fetch with timeout ── */
async function fetchJSON(url,ms=8000){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),ms);
  try{
    const r=await fetch(url,{signal:ctrl.signal});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }finally{ clearTimeout(t); }
}

/* ── Reload lock + cooldown bar ── */
function lockReload(){
  isLoading=true;
  E.reloadBtn.disabled=true;
  E.reloadBtn.textContent='Loading...';
}
function startCooldown(){
  E.bar.style.transition='none';
  E.bar.style.width='100%';
  E.bar.style.display='block';
  void E.bar.offsetWidth;
  let remaining=COOLDOWN_MS;
  const tick=200;
  clearInterval(cooldownInterval);
  clearTimeout(cooldownTimer);
  cooldownInterval=setInterval(()=>{
    remaining-=tick;
    const pct=Math.max(0,(remaining/COOLDOWN_MS)*100);
    E.bar.style.transition=`width ${tick}ms linear`;
    E.bar.style.width=pct+'%';
    const secs=Math.ceil(remaining/1000);
    E.reloadBtn.textContent=secs>0?`Wait ${secs}s`:'Wait...';
  },tick);
  cooldownTimer=setTimeout(()=>{
    clearInterval(cooldownInterval);
    E.bar.style.width='0%';
    setTimeout(()=>{ E.bar.style.display='none'; },200);
    isLoading=false;
    E.reloadBtn.disabled=false;
    E.reloadBtn.textContent='Reload';
  },COOLDOWN_MS);
}

/* ── UTC offset ── */
function getUTCOffset(tzId){
  if(!tzId) return '';
  try{
    const parts=new Intl.DateTimeFormat('en',{timeZone:tzId,timeZoneName:'shortOffset'}).formatToParts(new Date());
    return (parts.find(p=>p.type==='timeZoneName')?.value||'').replace('GMT','UTC');
  }catch(e){ return ''; }
}

/* ── Live clock (timezone row) ── */
let liveClockTimer=null;
let currentTZ='';
let clockRunning=false;

function getLiveTime(tzId){
  try{
    return new Intl.DateTimeFormat('en',{timeZone:tzId,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}).format(new Date());
  }catch(e){ return ''; }
}
function startLiveClock(){
  const badge=document.getElementById('utcBadge');
  if(!badge||!currentTZ) return;
  clockRunning=true;
  function tick(){ const t=getLiveTime(currentTZ); if(badge) badge.textContent=t; }
  tick();
  liveClockTimer=setInterval(tick,1000);
  badge.title='Tap to show UTC offset';
}
function stopLiveClock(){
  clearInterval(liveClockTimer);
  liveClockTimer=null;
  clockRunning=false;
  const badge=document.getElementById('utcBadge');
  if(badge&&currentTZ){ badge.textContent=getUTCOffset(currentTZ); badge.title='Tap to show live time'; }
}
function toggleClock(){ if(clockRunning) stopLiveClock(); else startLiveClock(); }

/* ── Populate ── */
function populate(d){
  E.country.textContent=[d.country,d.countryCode?`(${d.countryCode})`:''].filter(Boolean).join(' ')||'—';
  const lat=parseFloat(d.lat),lon=parseFloat(d.lon);
  if(!isNaN(lat)){
    currentLat=lat;currentLon=lon;
    clearSkel(E.latlng,`${lat.toFixed(4)}, ${lon.toFixed(4)}`);
  } else clearSkel(E.latlng,'—');
  clearSkel(E.city,[d.city,d.regionName].filter(Boolean).join(', ')||'—');
  clearSkel(E.isp,d.isp||'—');

  const tz=d.timezone||'';
  currentTZ=tz;
  stopLiveClock();
  const utc=getUTCOffset(tz);
  if(tz){
    clearSkel(E.tz,
      `${tz}${utc?` <span class="utc-badge" id="utcBadge" title="Tap to show live time" style="cursor:pointer">${utc}</span>`:''}`,
      true
    );
    const badge=document.getElementById('utcBadge');
    if(badge) badge.addEventListener('click',toggleClock);
  } else clearSkel(E.tz,'—');
}

/* ── GEO SOURCES ── */
/* ── GEO SOURCES (all HTTPS, all free, no key) ──
   1. ipwho.is        — fast, HTTPS, returns ISP
   2. freeipapi.com   — HTTPS fallback
   3. ipapi.co        — HTTPS, 30k/day free
   ── */
async function geoFromIpWhoIs(){
  const d=await fetchJSON('https://ipwho.is/');
  if(!d.success) throw new Error('ipwho.is: '+d.message);
  return{country:d.country,countryCode:d.country_code,lat:d.latitude,lon:d.longitude,
         city:d.city,regionName:d.region,isp:d.connection?.isp||d.connection?.org||'',timezone:d.timezone?.id||''};
}
async function geoFromFreeIpApi(){
  const d=await fetchJSON('https://freeipapi.com/api/json');
  if(!d.ipAddress) throw new Error('freeipapi error');
  return{country:d.countryName,countryCode:d.countryCode,lat:d.latitude,lon:d.longitude,
         city:d.cityName,regionName:d.regionName,isp:d.isp||'',timezone:d.timeZone||''};
}
async function geoFromIpApiCo(){
  const d=await fetchJSON('https://ipapi.co/json/');
  if(d.error) throw new Error('ipapi.co: '+d.reason);
  return{country:d.country_name,countryCode:d.country_code,lat:d.latitude,lon:d.longitude,
         city:d.city,regionName:d.region,isp:d.org||'',timezone:d.timezone||''};
}

/* ── Load my IP ── */
async function loadMyIP(){
  if(isLoading){toast('Please wait...', null);return;}
  lockReload();
  E.country.innerHTML='<span class="spinner"></span>Loading...';
  showSkeletons();

  const [v4,v6]=await Promise.allSettled([
    fetchJSON('https://api.ipify.org?format=json'),
    fetchJSON('https://api64.ipify.org?format=json')
  ]);
  if(v4.status==='fulfilled'&&v4.value?.ip) clearSkel(E.ipv4,v4.value.ip);
  else clearSkel(E.ipv4,'Unavailable');
  if(v6.status==='fulfilled'&&v6.value?.ip){
    const ip=v6.value.ip;
    if(ip.includes(':')) clearSkel(E.ipv6,ip);
    else{ clearSkel(E.ipv6,'Unavailable'); if(E.ipv4.textContent==='—') clearSkel(E.ipv4,ip); }
  } else clearSkel(E.ipv6,'Unavailable');

  let geo=null;
  for(const src of [geoFromIpWhoIs,geoFromFreeIpApi,geoFromIpApiCo]){
    try{ geo=await src(); break; }
    catch(e){ console.warn(src.name,e.message); }
  }
  if(geo) populate(geo);
  else{
    E.country.textContent='Location unavailable';
    ['latlng','city','isp','tz'].forEach(k=>clearSkel(E[k],'—'));
    toast('All geo sources failed — check your connection', false);
  }
  startCooldown();
}

/* ── Custom IP / Domain lookup ── */
async function lookupCustom(){
  const raw=E.inp.value.trim();
  if(!raw){toast('Enter an IP or domain', null);return;}
  E.rBox.style.display='none';E.cRes.style.display='none';E.rIP.innerHTML='';
  const ipv4Re=/^(\d{1,3}\.){3}\d{1,3}$/;
  const ipv6Re=/^[0-9a-fA-F:]+$/;
  const isDomain=!ipv4Re.test(raw)&&!ipv6Re.test(raw);
  let ipToQuery=raw;
  if(isDomain){
    try{
      const [r4,r6]=await Promise.all([
        fetchJSON(`https://dns.google/resolve?name=${encodeURIComponent(raw)}&type=A`),
        fetchJSON(`https://dns.google/resolve?name=${encodeURIComponent(raw)}&type=AAAA`)
      ]);
      const v4s=(r4.Answer||[]).filter(x=>x.type===1).map(x=>x.data);
      const v6s=(r6.Answer||[]).filter(x=>x.type===28).map(x=>x.data);
      const all=[...new Set([...v4s,...v6s])];
      if(!all.length){toast('Could not resolve domain', false);return;}
      E.rBox.style.display='block';
      all.forEach(ip=>{
        const chip=document.createElement('span');
        chip.className='chip '+(ipv4Re.test(ip)?'ipv4':'ipv6');
        chip.textContent=ip;chip.title='Click to lookup';
        chip.addEventListener('click',()=>{E.inp.value=ip;E.clearBtn.classList.add('show');lookupCustom();});
        E.rIP.appendChild(chip);
      });
      ipToQuery=v4s[0]||v6s[0];
    }catch(e){toast('DNS resolution failed', false);console.error(e);return;}
  }
  try{
    // Try ipwho.is first, fallback to ipapi.co/{ip}
    let d = await fetchJSON(`https://ipwho.is/${encodeURIComponent(ipToQuery)}`);
    if(!d.success){
      // fallback
      d = await fetchJSON(`https://ipapi.co/${encodeURIComponent(ipToQuery)}/json/`);
      if(d.error) throw new Error(d.reason||'lookup failed');
      E.cRes.style.display='block';
      E.cc.textContent=[d.country_name,d.country_code?`(${d.country_code})`:''].filter(Boolean).join(' ')||'—';
      E.cct.textContent=[d.city,d.region].filter(Boolean).join(', ')||'—';
      E.cl.textContent=(d.latitude&&d.longitude)?`${parseFloat(d.latitude).toFixed(4)}, ${parseFloat(d.longitude).toFixed(4)}`:'—';
      E.ci.textContent=d.org||'—';
    } else {
      E.cRes.style.display='block';
      E.cc.textContent=[d.country,d.country_code?`(${d.country_code})`:''].filter(Boolean).join(' ')||'—';
      E.cct.textContent=[d.city,d.region].filter(Boolean).join(', ')||'—';
      E.cl.textContent=(d.latitude&&d.longitude)?`${parseFloat(d.latitude).toFixed(4)}, ${parseFloat(d.longitude).toFixed(4)}`:'—';
      E.ci.textContent=d.connection?.isp||d.connection?.org||'—';
    }
  }catch(e){toast('Geo lookup failed', false);console.error(e);}
}

let mapClockTimer=null;
let mapClockTZ='';
let mapTimeMode='live';

function getMapTime(tzId){
  try{ return new Intl.DateTimeFormat('en',{timeZone:tzId,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}).format(new Date()); }
  catch(e){ return ''; }
}
function getMapUTC(tzId){
  if(!tzId) return '';
  try{
    const parts=new Intl.DateTimeFormat('en',{timeZone:tzId,timeZoneName:'shortOffset'}).formatToParts(new Date());
    return (parts.find(p=>p.type==='timeZoneName')?.value||'').replace('GMT','UTC');
  }catch(e){ return ''; }
}
function renderMapTime(){
  if(!mapClockTZ){E.mapTime.textContent='';return;}
  E.mapTime.textContent=mapTimeMode==='live'?getMapTime(mapClockTZ):getMapUTC(mapClockTZ);
}
function setMapClock(tzId){
  clearInterval(mapClockTimer);
  if(!tzId){E.mapTime.textContent='';return;}
  mapClockTZ=tzId;
  renderMapTime();
  mapClockTimer=setInterval(renderMapTime,1000);
}
E.mapTime.addEventListener('click',()=>{ mapTimeMode=mapTimeMode==='live'?'utc':'live'; renderMapTime(); });

async function loadTopoJSON(){
  if(window.topojson) return;
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://unpkg.com/topojson-client@3/dist/topojson-client.min.js';
    s.onload=res;s.onerror=rej;document.body.appendChild(s);
  });
}
async function loadWorldGeo(){
  if(cachedGeo) return cachedGeo;

  // Fix 3: try sessionStorage cache first (avoids re-download on page revisit)
  const GEO_KEY='ipinfo-worldgeo-v1';
  try{
    const stored=sessionStorage.getItem(GEO_KEY);
    if(stored){
      cachedGeo=JSON.parse(stored);
      return cachedGeo;
    }
  }catch(e){ /* storage full or parse error — ignore, fetch fresh */ }

  const d=await fetchJSON('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
  cachedGeo=topojson.feature(d,d.objects.countries);

  // Store for next visit (GeoJSON ~600KB — fits fine in 5MB quota)
  try{ sessionStorage.setItem(GEO_KEY,JSON.stringify(cachedGeo)); }catch(e){}

  return cachedGeo;
}

function updateZoomUI(z){
  currentMapZoom=z;
  E.zoomNum.textContent=z;
  E.zoomOut.disabled=(z<=MIN_ZOOM);
  E.zoomIn.disabled=(z>=MAX_ZOOM);
}
function applyZoom(z){
  z=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,z));
  updateZoomUI(z);
  if(mapInstance){
    if(!isNaN(currentLat)) mapInstance.setView([currentLat,currentLon],z,{animate:true});
    else mapInstance.setZoom(z,{animate:true});
  }
}
E.zoomIn.addEventListener('click',()=>applyZoom(currentMapZoom+1));
E.zoomOut.addEventListener('click',()=>applyZoom(currentMapZoom-1));

/* mapLabel button — reset zoom to 3 + re-center on located country */
function resetMapToCountry(){
  if(!mapInstance||!cachedGeo) return;
  const uc=E.country.textContent.replace(/\s*\(.*\)/,'').trim().toLowerCase();
  for(const f of cachedGeo.features){
    if((f.properties.name||'').toLowerCase()===uc){
      const c=L.geoJSON(f).getBounds().getCenter();
      applyZoom(3); // resets zoom number
      mapInstance.setView(c,3,{animate:true});
      return;
    }
  }
  // fallback to dot
  if(!isNaN(currentLat)) mapInstance.setView([currentLat,currentLon],3,{animate:true});
}
E.mapLabel.addEventListener('click',resetMapToCountry);

function toggleFullscreen(){
  isFullscreen=!isFullscreen;
  E.mapBox.classList.toggle('fullscreen',isFullscreen);
  E.fsBtn.innerHTML=isFullscreen?'&#x2715;':'&#x26F6;';
  E.fsBtn.title=isFullscreen?'Exit full screen':'Full screen';
  if(mapInstance){
    if(isFullscreen){
      mapInstance.dragging.enable();
      mapInstance.scrollWheelZoom.enable();
      mapInstance.touchZoom.enable();
      mapInstance.doubleClickZoom.enable();
    } else {
      mapInstance.dragging.disable();
      mapInstance.scrollWheelZoom.disable();
      mapInstance.touchZoom.disable();
      mapInstance.doubleClickZoom.disable();
    }
    setTimeout(()=>{
      mapInstance.invalidateSize();
      if(cachedGeo&&!isFullscreen){
        const uc=E.country.textContent.replace(/\s*\(.*\)/,'').trim().toLowerCase();
        let found=false;
        for(const f of cachedGeo.features){
          if((f.properties.name||'').toLowerCase()===uc){
            const c=L.geoJSON(f).getBounds().getCenter();
            mapInstance.setView(c,currentMapZoom,{animate:false});
            found=true; break;
          }
        }
        if(!found&&!isNaN(currentLat)) mapInstance.setView([currentLat,currentLon],currentMapZoom,{animate:false});
      }
    },80);
  }
}
E.fsBtn.addEventListener('click',toggleFullscreen);
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&isFullscreen) toggleFullscreen(); });

function renderMap(geo){
  if(!mapInstance) return;
  if(geoLayer){geoLayer.remove();geoLayer=null;}
  if(cityMarker){cityMarker.remove();cityMarker=null;}
  const primary=getComputedStyle(document.body).getPropertyValue('--p').trim();
  const pcColor=getComputedStyle(document.body).getPropertyValue('--pc').trim();
  const uc=E.country.textContent.replace(/\s*\(.*\)/,'').trim().toLowerCase();
  let centered=false;

  geoLayer=L.geoJSON(geo,{
    style:f=>{
      const m=(f.properties.name||'').toLowerCase()===uc;
      return{
        // Fix 2: dark mode matched-country border = --pc (theme dropdown color)
        color:  m?(isDark?pcColor:primary):(isDark?'#444':'#8fa8b8'),
        weight: m?2:1.2,
        fillColor: m?primary:(isDark?'#222':'#1a1f23'),
        fillOpacity: m?0.45:(isDark?0.2:0.18)
      };
    },
    onEachFeature:(f,layer)=>{
      const name=f.properties.name||'Unknown';
      const m=name.toLowerCase()===uc;
      if(m&&!centered){
        centered=true;
        mapInstance.setView(layer.getBounds().getCenter(),currentMapZoom);
        E.mapLabel.textContent=name;
        setMapClock(currentTZ);
      }
      layer.on('mouseover',e=>{ e.target.setStyle({weight:2.4,color:'#4a6070'}); });
      layer.on('mouseout', e=>{ geoLayer.resetStyle(e.target); });
      layer.on('click',()=>{
        E.mapLabel.textContent=name;
        setMapClock(COUNTRY_TZ[name]||currentTZ);
        if(m){
          // Normal view: only re-center if at default zoom(3); otherwise leave map, zoom buttons focus dot
          if(!isFullscreen){
            if(currentMapZoom===3){
              mapInstance.setView(layer.getBounds().getCenter(),3,{animate:true});
            }
            // else: do nothing — user is zoomed in, let them use zoom buttons
          } else {
            // Fullscreen: always re-center on country
            mapInstance.setView(layer.getBounds().getCenter(),currentMapZoom,{animate:true});
          }
        }
        // other countries: name + clock update, no map movement in either mode
      });
    }
  }).addTo(mapInstance);

  if(!isNaN(currentLat)){
    cityMarker=L.circleMarker([currentLat,currentLon],{
      radius:7,
      color:    isDark?pcColor:primary,   // Fix 5: use theme color
      weight:   2.5,
      fillColor:isDark?pcColor:primary,
      fillOpacity:0.85
    }).addTo(mapInstance);
    // Fix 5: tooltip uses CSS vars via className
    cityMarker.bindTooltip(E.city.textContent||'Your location',{
      direction:'top',
      className:'map-city-tip'
    });
  }
}

async function showMap(){
  if(isNaN(currentLat)){toast('Location unavailable', false);return;}
  const vis=E.mapBox.classList.toggle('show');
  E.mapBtn.textContent=vis?'Hide Map':'Show Map';
  if(!vis) return;
  try{
    await loadTopoJSON();
    setTimeout(async()=>{
      if(!mapInstance){
        mapInstance=L.map('map',{renderer:L.canvas(),zoomControl:false,attributionControl:false,
          dragging:false,scrollWheelZoom:false,doubleClickZoom:false,
          boxZoom:false,keyboard:false,touchZoom:false
        }).setView([currentLat,currentLon],currentMapZoom);
        mapInstance.on('zoomend',()=>{ updateZoomUI(mapInstance.getZoom()); });
      }
      renderMap(await loadWorldGeo());
      mapInstance.invalidateSize();
      updateZoomUI(currentMapZoom);
    },120);
  }catch(e){toast('Map failed to load', false);console.error(e);}
}
E.mapBtn.addEventListener('click',showMap);

/* ── Reload ── */
E.reloadBtn.addEventListener('click',()=>{
  if(isLoading){toast('Please wait...', null);return;}
  currentLat=NaN;currentLon=NaN;
  clearInterval(mapClockTimer);mapClockTimer=null;E.mapTime.textContent='';
  if(mapInstance){mapInstance.remove();mapInstance=null;}
  geoLayer=null;cityMarker=null;
  if(isFullscreen) toggleFullscreen();
  if(E.mapBox.classList.contains('show')){E.mapBox.classList.remove('show');E.mapBtn.textContent='Show Map';}
  loadMyIP();
});

/* ── Init ── */
initTheme();          // load saved color theme
updateZoomUI(currentMapZoom);
loadMyIP();
