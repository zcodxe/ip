<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light dark"><meta name="theme-color" content="#3a86ff"><title>IP Info</title><style>*,*:before,*:after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;min-width:0}:root{--bg:#eef2f5;--text:#2a2f33;--border:#c9d3dc;--label:#5f7a8a;--surface:#f7f9fb;--sv:#dde5ec;--os:#2a2f33;--osv:#6b7c88;--p:#5c8d89;--op:#fff;--pc:#cfe3e1;--opc:#1f3e3c}body.dark{--bg:#14181b;--text:#d8dee3;--border:#2a3136;--label:#8fa3ad;--surface:#1b2024;--sv:#252c31;--os:#d8dee3;--osv:#9fb0ba;--p:#7fb3ad;--op:#0f1412;--pc:#2e4a48;--opc:#cfe3e1}body{font-family:Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}header{height:56px;background:var(--surface);display:flex;justify-content:flex-end;align-items:center;padding:0 12px;border-bottom:1px solid var(--border);gap:10px}button{cursor:pointer;border:none;border-radius:20px;font-weight:600}.btn{background:var(--p);color:var(--op);padding:8px 12px;min-width:70px;display:inline-flex;align-items:center;justify-content:center}main{max-width:560px;margin:auto;padding:16px;min-height:115dvh}.info-row{padding:12px 0}.info-label{font-size:13px;color:var(--label)}.info-value{font-family:monospace;word-break:break-all;cursor:pointer}.db{width:100%;margin-top:16px;padding:14px;color:var(--opc);background:var(--pc);display:flex;justify-content:space-between;align-items:center;border-radius:10px}.dc{display:none;padding:12px;border:1px solid var(--sv);border-radius:10px;margin-top:6px}.dc.show{display:block}.ig{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}.ig input{flex:1 1 0;min-width:0}.ig .btn{flex:0 1 auto;white-space:nowrap}input{padding:10px;border:1px solid var(--border);background:var(--surface);color:var(--os);caret-color:var(--p);border-radius:8px}input::placeholder{color:var(--osv);opacity:1}input:focus{outline:none;border-color:var(--p)}.cc{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}.chip{display:inline-flex;align-items:center;padding:6px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--os);transition:transform .15s,opacity .2s}.chip.ipv4{background:var(--pc);color:var(--opc)}.chip.ipv6{background:var(--sv);color:var(--osv)}.chip:active{transform:scale(0.95)}.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--os);color:var(--surface);padding:8px 14px;border-radius:20px;opacity:0;transition:.3s}.toast.show{opacity:.9}@media(max-width:480px){header{position:fixed;bottom:0;left:0;width:100%;padding:10px;border-top:1px solid var(--border);border-bottom:none;justify-content:space-between;background:var(--surface);z-index:1000;gap:10px}.btn{flex:1;padding:12px}.ig{flex-direction:column}.ig .btn{width:100%}main{padding-bottom:80px}}</style></head><body><header><button id="R" class="btn">Reload</button><button id="T" class="btn">Dark</button></header><main><div class="info-row"><div class="info-label">Country</div><div id="country">—</div></div><div class="info-row"><div class="info-label">Latitude, Longitude</div><div id="latlng" class="info-value">—</div></div><button class="db" onclick="tg('loc')">Location & ISP <span>›</span></button><div id="loc" class="dc"><div class="info-row"><div class="info-label">City & Region</div><div id="city">—</div></div><div class="info-row"><div class="info-label">ISP</div><div id="isp">—</div></div></div><button class="db" onclick="tg('ip')">IP Address <span>›</span></button><div id="ip" class="dc"><div class="info-row"><div class="info-label">IPv4</div><div id="ipv4" class="info-value">—</div></div><div class="info-row"><div class="info-label">IPv6</div><div id="ipv6" class="info-value">—</div></div></div><button class="db" onclick="tg('custom')">Check Custom IP <span>›</span></button><div id="custom" class="dc"><div class="ig"><input id="inp" placeholder="Enter IP or domain"><button class="btn" onclick="ck()">Lookup</button></div><div id="rBox" style="display:none"><div class="info-row"><div class="info-label">Resolved IPs</div><div id="rIP" class="cc"></div></div></div><div id="cRes" style="display:none"><div class="info-row"><div class="info-label">Country</div><div id="cc"></div></div><div class="info-row"><div class="info-label">Location</div><div id="cl" class="info-value"></div></div><div class="info-row"><div class="info-label">City</div><div id="cct"></div></div><div class="info-row"><div class="info-label">ISP</div><div id="ci"></div></div></div></div></main><div id="toast" class="toast"></div><script>
const $=i=>document.getElementById(i),
E={country:$('country'),city:$('city'),isp:$('isp'),latlng:$('latlng'),ipv4:$('ipv4'),ipv6:$('ipv6'),R:$('R'),T:$('T'),inp:$('inp'),cRes:$('cRes'),cc:$('cc'),cct:$('cct'),ci:$('ci'),cl:$('cl'),rBox:$('rBox'),rIP:$('rIP'),toast:$('toast')};
let L=0;
const toast=m=>{E.toast.textContent=m;E.toast.classList.add('show');setTimeout(()=>E.toast.classList.remove('show'),1500)};
const fj=async u=>{try{const a=new AbortController();setTimeout(()=>a.abort(),5000);const r=await fetch(u,{signal:a.signal});return r.ok?r.json():null}catch{return null}};
const setMain=d=>{E.country.textContent=`${d.country_name} (${d.country})`;E.city.textContent=`${d.city||''}${d.region?', '+d.region:''}`;E.isp.textContent=d.org||'Unknown';E.latlng.textContent=d.latitude!=null?`${d.latitude}, ${d.longitude}`:'—'};
const tg=i=>$(i).classList.toggle('show');
const isV4=i=>/^(25[0-5]|2[0-4]\d|1\d\d|\d?\d)(\.(25[0-5]|2[0-4]\d|1\d\d|\d?\d)){3}$/.test(i);
const isV6=i=>i.includes(':');
const isDom=i=>/^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/.test(i);
async function resolve(d){try{const[a,b]=await Promise.all([fetch(`https://dns.google/resolve?name=${d}&type=A`).then(r=>r.json()),fetch(`https://dns.google/resolve?name=${d}&type=AAAA`).then(r=>r.json())]);return{ipv4:a.Answer?.map(x=>x.data).filter(x=>!x.includes(':'))||[],ipv6:b.Answer?.map(x=>x.data).filter(x=>x.includes(':'))||[]}}catch{return null}}
const s4=a=>a.sort((a,b)=>a.split('.').reduce((r,v,i)=>r+(+v<<((3-i)*8)),0)-b.split('.').reduce((r,v,i)=>r+(+v<<((3-i)*8)),0));
const s6=a=>a.sort((a,b)=>a.localeCompare(b));
async function ck(){
let v=E.inp.value.trim();if(!v)return toast('Enter value');
let ip=null;
if(isV4(v)||isV6(v)){ip=v;E.rBox.style.display='none';}
else if(isDom(v)){toast('Resolving...');const res=await resolve(v);if(!res||(res.ipv4.length===0&&res.ipv6.length===0))return toast('Domain not found');const v4=s4(res.ipv4||[]),v6=s6(res.ipv6||[]);E.rIP.innerHTML='';[...v4.map(x=>({t:'ipv4',ip:x})),...v6.map(x=>({t:'ipv6',ip:x}))].forEach(item=>{const c=document.createElement('div');c.className=`chip ${item.t}`;c.textContent=item.ip;c.onclick=async()=>{try{await navigator.clipboard.writeText(item.ip)}catch{const ta=document.createElement('textarea');ta.value=item.ip;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}toast('Copied')};E.rIP.appendChild(c)});E.rBox.style.display='block';ip=v4||v6;}
else return toast('Invalid input');
const d=await fj(`https://ipapi.co/${ip}/json/`);if(!d||d.error)return toast('Lookup failed');
E.cc.textContent=`${d.country_name} (${d.country})`;E.cct.textContent=`${d.city||''}${d.region?', '+d.region:''}`;E.ci.textContent=d.org||'Unknown';E.cl.textContent=d.latitude!=null?`${d.latitude}, ${d.longitude}`:'—';E.cRes.style.display='block';toast('Done');
}
async function load(){if(L)return;L=1;E.R.disabled=1;E.R.textContent='Loading...';try{const[a,b]=await Promise.all([fj('https://api.ipify.org?format=json'),fj('https://api64.ipify.org?format=json')]);const i=a?.ip||'Unavailable',p=b?.ip||'Not supported';E.ipv4.textContent=i;E.ipv6.textContent=p;if(i!=='Unavailable'){const o=await fj(`https://ipapi.co/${i}/json/`);if(o)setMain(o)}toast('Updated')}catch{toast('Error')}E.R.textContent='Reload';E.R.disabled=0;L=0}
document.addEventListener('click',a=>{if(a.target.classList.contains('info-value')){navigator.clipboard.writeText(a.target.textContent);toast('Copied')}});
const theme=i=>{document.body.classList.toggle('dark',i==='dark');E.T.textContent=i==='dark'?'Light':'Dark';localStorage.setItem('theme',i)};
E.T.onclick=()=>theme(document.body.classList.contains('dark')?'light':'dark');
E.R.onclick=load;
theme(localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));
load();window.tg=tg;window.ck=ck;
</script></body></html>
