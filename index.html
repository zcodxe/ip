<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Finder</title>
  <style>
    :root {
      --bg-primary: #cacaca;
      --bg-secondary: #f2f2f2;
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --text-tertiary: #999;
      --border-color: #e5e5e5;
      --input-bg: #f9f9f9;
      --accent-color: #387ed1;
      --accent-hover: #2f6fbd;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #323232;
        --bg-secondary: #1e1e1e;
        --text-primary: #f5f7fa;
        --text-secondary: #b0b7c3;
        --text-tertiary: #7d8592;
        --border-color: #2a2f36;
        --input-bg: #12151a;
        --accent-color: #4a9eff;
        --accent-hover: #3386e8;
        --shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 24px;
      background: var(--bg-secondary);
      border-radius: 14px;
      box-shadow: var(--shadow);
      transition: background 0.3s, box-shadow 0.3s;
    }

    h1 {
      margin-bottom: 18px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .country {
      margin-bottom: 8px;
      font-size: clamp(2rem, 6vw, 3.3rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--accent-color);
      word-break: break-word;
    }

    .city {
      margin-bottom: 20px;
      font-size: clamp(1rem, 2.6vw, 1.2rem);
      font-weight: 500;
      color: var(--text-secondary);
      word-break: break-word;
    }

    .divider {
      height: 1px;
      margin: 18px 0;
      background: var(--border-color);
    }

    .ip-label {
      margin-bottom: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    .ip {
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 8px;
      background: var(--input-bg);
      font-family: "Courier New", monospace;
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      font-weight: 600;
      letter-spacing: 0.5px;
      word-break: break-all;
      color: var(--text-primary);
      transition: background 0.3s;
    }

    .loading {
      color: var(--text-tertiary);
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: 0;
      border-radius: 8px;
      background: var(--accent-color);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.25s, transform 0.1s;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Your Location</h1>

    <div class="country" id="country">—</div>
    <div class="city loading" id="city">Fetching...</div>

    <div class="divider"></div>

    <div class="ip-label">IP Address</div>
    <div class="ip loading" id="ip">—</div>

    <button id="refreshBtn" type="button">Refresh</button>
  </main>

  <script>
    const countryEl = document.getElementById("country");
    const cityEl = document.getElementById("city");
    const ipEl = document.getElementById("ip");
    const refreshBtn = document.getElementById("refreshBtn");

    function loadIPData() {
      countryEl.textContent = "—";
      cityEl.textContent = "Fetching...";
      ipEl.textContent = "—";
      cityEl.classList.add("loading");
      ipEl.classList.add("loading");

      fetch("https://ipapi.co/json/")
        .then((res) => res.json())
        .then((data) => {
          countryEl.textContent = data.country_name || "Unknown";
          cityEl.textContent = [data.city, data.region].filter(Boolean).join(", ") || "Unknown";
          ipEl.textContent = data.ip || "Unknown";
          cityEl.classList.remove("loading");
          ipEl.classList.remove("loading");
        })
        .catch(() => {
          countryEl.textContent = "Error";
          cityEl.textContent = "Unable to fetch";
          ipEl.textContent = "—";
          cityEl.classList.remove("loading");
          ipEl.classList.remove("loading");
        });
    }

    refreshBtn.addEventListener("click", loadIPData);
    loadIPData();
  </script>
</body>
</html>
